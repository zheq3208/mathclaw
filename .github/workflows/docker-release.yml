# Build MathClaw multi-arch Docker image and push to DockerHub on release.
name: Docker Build and Push on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. v1.2.3)"
        required: true
        type: string

env:
  IMAGE: zheq3208/mathclaw

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch (version + latest)
        env:
          VERSION: ${{ github.event.release.tag_name || inputs.version }}
          MATHCLAW_ENABLED_CHANNELS: "discord,dingtalk,feishu,qq,console"
        run: |
          TAGS="-t docker.io/${IMAGE}:${VERSION} -t docker.io/${IMAGE}:latest"
          docker buildx build --platform linux/amd64,linux/arm64 \
            -f deploy/Dockerfile \
            --build-arg MATHCLAW_ENABLED_CHANNELS="${MATHCLAW_ENABLED_CHANNELS}" \
            ${TAGS} --push .
