repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-ast
        exclude: '.*/skills/.*'
      - id: sort-simple-yaml
        exclude: '.*/skills/.*'
      - id: check-yaml
        exclude: |
          (?x)^(
              meta.yaml
          )$
      - id: check-xml
        exclude: '.*/skills/.*'
      - id: check-toml
      - id: check-docstring-first
        exclude: '.*/skills/.*'
      - id: check-json
        exclude: '.*/skills/.*'
      - id: fix-encoding-pragma
        args: [--remove]
        exclude: '.*/skills/.*'
      - id: detect-private-key
      - id: trailing-whitespace
        exclude: '.*/skills/.*'
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v3.1.0
    hooks:
      - id: add-trailing-comma
        exclude: '.*/skills/.*'
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        exclude:
          (?x)(
          pb2\.py$
          | grpc\.py$
          | ^docs
          | \.html$
          | .*/skills/.*
          )
        args: [
          --ignore-missing-imports,
          --disable-error-code=var-annotated,
          --disable-error-code=union-attr,
          --disable-error-code=assignment,
          --disable-error-code=attr-defined,
          --disable-error-code=import-untyped,
          --disable-error-code=truthy-function,
          --disable-error-code=index,
          --disable-error-code=valid-type,
          --disable-error-code=typeddict-item,
          --disable-error-code=arg-type,
          --disable-error-code=call-arg,
          --disable-error-code=name-defined,
          --disable-error-code=operator,
          --follow-imports=skip,
          --explicit-package-bases,
        ]
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        args: [ --line-length=79 ]
        exclude: '.*/skills/.*'
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: [ "--extend-ignore=E203"]
        exclude: '.*/skills/.*'
  - repo: https://github.com/pylint-dev/pylint
    rev: v3.0.2
    hooks:
      - id: pylint
        exclude:
          (?x)(
          ^docs
          | pb2\.py$
          | grpc\.py$
          | \.demo$
          | \.md$
          | \.html$
          | .*/skills/.*
          )
        args: [
          --disable=W0511,
          --disable=W0718,
          --disable=W0122,
          --disable=C0103,
          --disable=R0913,
          --disable=E0401,
          --disable=E1101,
          --disable=C0415,
          --disable=W0603,
          --disable=R1705,
          --disable=R0914,
          --disable=E0601,
          --disable=W0602,
          --disable=W0604,
          --disable=R0801,
          --disable=R0902,
          --disable=R0903,
          --disable=C0123,
          --disable=W0231,
          --disable=W1113,
          --disable=W0221,
          --disable=R0401,
          --disable=W0632,
          --disable=W0123,
          --disable=C3001,
          --disable=W0201,
          --disable=C0302,
          --disable=W1203,
          --disable=C2801,
          --disable=C0114,
          --disable=C0115,
          --disable=C0116,
          --disable=C0301,
          --disable=C0206,
          --disable=C0413,
          --disable=R0911,
          --disable=R0912,
          --disable=R0915,
          --disable=R0904,
          --disable=R1702,
          --disable=W0107,
          --disable=W0212,
          --disable=W0611,
          --disable=W0612,
          --disable=W0613,
          --disable=W0621,
          --disable=W0707,
          --disable=W1309,
          --disable=W1510,
          --disable=W2301,
          --disable=E0603,
          --disable=E0611,
          --disable=E1120,
          --disable=E1123,
          --disable=E1130,
          --disable=F0010,
        ]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: 'v3.0.0'
    hooks:
      - id: prettier
        additional_dependencies: [ 'prettier@3.0.0' ]
        files: \.(tsx?)$
        exclude: '(?x)(^web/|^console/|/dist/|.*/skills/.*)'
